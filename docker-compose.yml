# Official public Docker quickstart.
# This stack is localhost-only by default and uses demo-local credentials so a
# new user can boot the product without first creating a private .env file.
# Replace those demo values through docker-compose.override.yml before using it
# anywhere beyond a throwaway local try-out.
services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3000
      ORCHESTRATOR_CONFIG: /workspace/orchestrator/orchestrator_config.json
      ORCHESTRATOR_FAST_START: "true"
      GITHUB_ACTIONS_MONITOR_ENABLED: "false"
      MONGO_USERNAME: demo-orchestrator
      MONGO_PASSWORD: demo-local-only-mongo-password
      DATABASE_URL: mongodb://demo-orchestrator:demo-local-only-mongo-password@mongo:27017/orchestrator?authSource=admin
      REDIS_PASSWORD: demo-local-only-redis-password
      REDIS_URL: redis://:demo-local-only-redis-password@redis:6379/0
      WEBHOOK_SECRET: demo-local-only-webhook-secret
      API_KEY_ROTATION: >-
        [{"key":"demo-viewer-key-local-only","label":"viewer-key","roles":["viewer"],"expiresAt":"2030-01-01T00:00:00.000Z"},{"key":"demo-operator-key-local-only","label":"operator-key","roles":["operator"],"expiresAt":"2030-01-01T00:00:00.000Z"},{"key":"demo-admin-key-local-only","label":"admin-key","roles":["admin"],"expiresAt":"2030-01-01T00:00:00.000Z"}]
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    ports:
      - "127.0.0.1:4300:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - demo-logs:/workspace/logs
      - demo-state:/workspace/orchestrator/data

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: demo-orchestrator
      MONGO_INITDB_ROOT_PASSWORD: demo-local-only-mongo-password
    command: mongod --auth
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "demo-orchestrator",
          "--password",
          "demo-local-only-mongo-password",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - demo-mongo-data:/data/db

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "demo-local-only-redis-password",
      ]
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "demo-local-only-redis-password", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - demo-redis-data:/data

volumes:
  demo-logs:
  demo-mongo-data:
  demo-redis-data:
  demo-state:
